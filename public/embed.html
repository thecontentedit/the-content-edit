<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Content Edit — Grid Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1C1915;
    --cream: #F9F6F1;
    --muted: #7A7570;
    --border: rgba(28,25,21,0.12);
    --radius: 4px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOADING ── */
  #loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; gap: 8px;
    font-size: 13px; color: var(--muted);
  }

  .spinner {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  #error {
    display: none; padding: 1.5rem; text-align: center;
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }

  /* ── GRID ── */
  #widget { display: none; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  /* ── CELL ── */
  .cell {
    position: relative;
    aspect-ratio: 1;
    overflow: visible;
    cursor: pointer;
    background: #e8e4dd;
  }

  .cell-inner {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
  }

  .cell img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .22s ease;
  }

  .cell:hover .cell-inner img { transform: scale(1.04); }

  .cell-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background .2s;
  }
  .cell:hover .cell-overlay { background: rgba(0,0,0,0.22); }

  /* placeholder para Canva/Pinterest */
  .cell-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #EDEAE4; gap: 6px;
  }
  .cell-placeholder svg { width: 20px; height: 20px; opacity: .4; }
  .cell-placeholder span { font-size: 10px; color: var(--muted); letter-spacing: .04em; }

  /* ── BADGES ── */
  .badge-tr {
    position: absolute; top: 5px; right: 5px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
    pointer-events: none; z-index: 2;
  }
  .badge-tr svg { width: 17px; height: 17px; }

  .badge-tl {
    position: absolute; top: 5px; left: 5px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
    pointer-events: none; z-index: 2;
  }
  .badge-tl svg { width: 17px; height: 17px; }

  /* ── TOOLTIP ── */
  .tooltip {
    position: absolute;
    bottom: calc(100% + 7px); left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: #fff;
    border: 0.5px solid rgba(28,25,21,.18);
    border-radius: 8px;
    padding: 7px 10px;
    width: 155px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s, transform .15s;
    z-index: 200;
    box-shadow: 0 4px 14px rgba(0,0,0,.1);
  }
  .cell:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

  .tooltip-name {
    font-size: 11px; font-weight: 500;
    color: var(--ink); line-height: 1.35;
    margin-bottom: 4px;
  }
  .tooltip-date {
    font-size: 10px; color: var(--muted);
    display: flex; align-items: center; gap: 3px;
  }
  .tooltip-date svg { width: 10px; height: 10px; flex-shrink: 0; }

  .tooltip-arrow {
    position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 7px; height: 7px;
    background: #fff;
    border-right: 0.5px solid rgba(28,25,21,.18);
    border-bottom: 0.5px solid rgba(28,25,21,.18);
  }

  /* tooltip flip para última fila */
  .cell.flip-tooltip .tooltip {
    bottom: auto; top: calc(100% + 7px);
    transform: translateX(-50%) translateY(-4px);
  }
  .cell.flip-tooltip:hover .tooltip { transform: translateX(-50%) translateY(0); }
  .cell.flip-tooltip .tooltip-arrow {
    bottom: auto; top: -4px;
    border-right: none; border-bottom: none;
    border-left: 0.5px solid rgba(28,25,21,.18);
    border-top: 0.5px solid rgba(28,25,21,.18);
  }

  /* ── EMPTY CELL ── */
  .empty-cell {
    aspect-ratio: 1;
    background: #F4F1EC;
    border: 1.5px dashed rgba(28,25,21,.12);
    display: flex; align-items: center; justify-content: center;
  }
  .empty-cell span { font-size: 11px; color: var(--muted); }

  /* ── WATERMARK ── */
  .watermark {
    text-align: center; margin-top: 8px;
    font-size: 10px; color: rgba(28,25,21,.25);
    letter-spacing: .06em; text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  Cargando tu grid…
</div>

<div id="error">
  <p>No se pudo cargar el grid.</p>
  <p style="margin-top:4px;font-size:11px;">Verifica que tu integración de Notion esté activa.</p>
</div>

<div id="widget">
  <div class="grid" id="grid"></div>
  <div class="watermark">The Content Edit</div>
</div>

<script>
// El widgetId viene en la URL: /embed/WIDGET_ID
const widgetId = location.pathname.split('/').filter(Boolean).pop();
const API_BASE  = location.origin;

const icons = {
  carousel: `<svg viewBox="0 0 48 48" fill="white"><path d="M34.8 29.7V11c0-2.9-2.3-5.2-5.2-5.2H11c-2.9 0-5.2 2.3-5.2 5.2v18.7c0 2.9 2.3 5.2 5.2 5.2h18.6c2.9 0 5.2-2.3 5.2-5.2zm-3.7 0c0 .8-.7 1.5-1.5 1.5H11c-.8 0-1.5-.7-1.5-1.5V11c0-.8.7-1.5 1.5-1.5h18.6c.8 0 1.5.7 1.5 1.5v18.7zm6-21.7V32c0 2-1.6 3.7-3.7 3.7H10.6c-.6 0-1-.4-1-1s.4-1 1-1H33.4c.9 0 1.7-.8 1.7-1.7V8c0-.6.4-1 1-1s1 .4 1 1z"/></svg>`,
  reel: `<svg viewBox="0 0 24 24" fill="white"><path d="M10 15.5v-7l6 3.5-6 3.5zM21 3H3C1.9 3 1 3.9 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>`,
  pinned: `<svg viewBox="0 0 24 24" fill="white"><path d="M17 4a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v1l1 1v5l-2 2v2h5v5l1 1 1-1v-5h5v-2l-2-2V6l1-1V4z"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  canva: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>`,
};

async function loadWidget() {
  try {
    const res = await fetch(`${API_BASE}/api/widget/${widgetId}`);
    if (!res.ok) throw new Error(res.status);

    const { posts, plan } = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('widget').style.display  = 'block';

    renderGrid(posts, plan);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'block';
  }
}

function renderGrid(posts, plan) {
  const grid = document.getElementById('grid');
  const total = Math.max(posts.length, 9);
  const slots = Array.from({ length: total }, (_, i) => posts[i] || null);

  slots.forEach((post, i) => {
    if (!post) {
      const empty = document.createElement('div');
      empty.className = 'empty-cell';
      empty.innerHTML = '<span>+ nuevo</span>';
      grid.appendChild(empty);
      return;
    }

    const row = Math.floor(i / 3);
    const totalRows = Math.ceil(slots.length / 3);
    const isLastRow = row === totalRows - 1;

    const cell = document.createElement('div');
    cell.className = 'cell' + (isLastRow ? ' flip-tooltip' : '');

    // inner (clipped)
    const inner = document.createElement('div');
    inner.className = 'cell-inner';

    if (post.imageUrl && !post.imageUrl.startsWith('__')) {
      const img = document.createElement('img');
      img.src = post.imageUrl;
      img.alt = post.name || '';
      img.loading = 'lazy';
      img.onerror = () => {
        img.style.display = 'none';
        inner.appendChild(makePlaceholder('imagen no disponible'));
      };
      inner.appendChild(img);
    } else {
      // Canva / Pinterest — placeholder con ícono
      const label = post.imageUrl?.includes('canva') ? 'Canva' : post.imageUrl?.includes('pinterest') ? 'Pinterest' : 'Link';
      inner.appendChild(makePlaceholder(label));
    }

    const overlay = document.createElement('div');
    overlay.className = 'cell-overlay';
    inner.appendChild(overlay);
    cell.appendChild(inner);

    // Badge top-right: carrusel o reel (solo pro)
    if (plan === 'pro' && (post.mediaType === 'carousel' || post.mediaType === 'reel')) {
      const b = document.createElement('div');
      b.className = 'badge-tr';
      b.innerHTML = post.mediaType === 'carousel' ? icons.carousel : icons.reel;
      cell.appendChild(b);
    }

    // Badge top-left: fijado (solo pro)
    if (plan === 'pro' && post.pinned) {
      const p = document.createElement('div');
      p.className = 'badge-tl';
      p.innerHTML = icons.pinned;
      cell.appendChild(p);
    }

    // Tooltip
    if (post.name || post.publishDate) {
      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip';
      tooltip.innerHTML = `
        ${post.name ? `<div class="tooltip-name">${escapeHtml(post.name)}</div>` : ''}
        ${post.publishDate ? `<div class="tooltip-date">${icons.calendar} ${escapeHtml(post.publishDate)}</div>` : ''}
        <div class="tooltip-arrow"></div>`;
      cell.appendChild(tooltip);
    }

    grid.appendChild(cell);
  });
}

function makePlaceholder(label) {
  const div = document.createElement('div');
  div.className = 'cell-placeholder';
  div.innerHTML = `${icons.canva}<span>${label}</span>`;
  return div;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadWidget();
</script>
</body>
</html>
