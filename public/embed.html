<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Content Edit</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1C1915; --cream: #F9F6F1; --muted: #7A7570; --border: rgba(28,25,21,0.12); --plan-accent: #F5C842; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: var(--ink); -webkit-font-smoothing: antialiased; }
  #loading { display: flex; align-items: center; justify-content: center; min-height: 200px; gap: 8px; font-size: 13px; color: var(--muted); }
  .spinner { width: 16px; height: 16px; border: 1.5px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { display: none; padding: 1.5rem; text-align: center; font-size: 13px; color: var(--muted); line-height: 1.6; }
  #widget { display: none; }
  #bio-section { padding: 12px 4px 10px; }
  .bio-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 10px; }
  .bio-avatar { width: 88px; height: 88px; border-radius: 50%; background: #E8E4DD; overflow: hidden; border: 2px solid rgba(28,25,21,0.1); flex-shrink: 0; }
  .bio-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .bio-avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; color: #fff; background: #C8B89A; }
  .bio-info { flex: 1; }
  .bio-username { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .bio-displayname { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 5px; }
  .bio-text { font-size: 12px; color: var(--ink); line-height: 1.5; margin-bottom: 4px; white-space: pre-line; }
  .bio-website { font-size: 12px; color: #0077CC; text-decoration: none; font-weight: 500; }
  .bio-website:hover { text-decoration: underline; }
  #highlights-section { display: flex; gap: 12px; padding: 8px 4px 10px; overflow-x: auto; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); margin-bottom: 8px; }
  .highlight-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .highlight-circle { width: 52px; height: 52px; border-radius: 50%; background: #E8E4DD; overflow: hidden; border: 2px solid rgba(28,25,21,0.12); }
  .highlight-circle img { width: 100%; height: 100%; object-fit: cover; }
  .highlight-label { font-size: 10px; color: var(--ink); text-align: center; max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .divider { height: 0.5px; background: var(--border); margin: 0 0 8px; }
  .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding: 0 4px; }
  .toolbar-btn { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 12px; border: none; border-radius: 999px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity .2s; }
  .toolbar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .btn-refresh { background: var(--ink); color: #F9F6F1; }
  .btn-plan { background: #F0EDE8; color: var(--ink); }
  .btn-plan.active { background: var(--ink); color: #F9F6F1; }
  .btn-icon { background: #F0EDE8; color: var(--ink); padding: 6px 10px; }
  .toolbar-btn:hover { opacity: .75; }
  .toolbar-spacer { flex: 1; }
  #plan-bar { display: none; align-items: center; gap: 6px; margin-bottom: 8px; padding: 8px 10px; background: #FFFBE8; border: 1px solid rgba(245,200,66,0.4); border-radius: 10px; }
  #plan-bar.visible { display: flex; }
  .plan-bar-label { font-size: 11px; font-weight: 600; color: #8A6F00; flex: 1; }
  .btn-cancel { background: #F0EDE8; color: var(--ink); padding: 5px 12px; border: none; border-radius: 999px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity .2s; }
  .btn-cancel:hover { opacity: .75; }
  .btn-save { background: var(--ink); color: #F9F6F1; padding: 5px 14px; border: none; border-radius: 999px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s; }
  .btn-save:hover { opacity: .75; }
  .btn-save:disabled { opacity: .4; cursor: default; }
  .tabs { display: flex; gap: 0; margin-bottom: 8px; border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 8px 0; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; letter-spacing: .04em; text-transform: uppercase; }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .tab:hover { color: var(--ink); }
  .widget-wrapper { position: relative; }
  #settings-panel { display: none; position: absolute; right: 4px; top: 100%; background: #fff; border: 0.5px solid rgba(28,25,21,0.15); border-radius: 14px; padding: 6px 0; width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 100; }
  #settings-panel.open { display: block; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; font-size: 14px; color: var(--ink); cursor: pointer; }
  .setting-row:hover { background: #F9F6F1; }
  .setting-divider { height: 0.5px; background: var(--border); margin: 4px 0; }
  .toggle { width: 36px; height: 20px; border-radius: 999px; background: #ccc; position: relative; flex-shrink: 0; transition: background .2s; }
  .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: transform .2s; }
  .toggle.on { background: #E8572A; }
  .toggle.on::after { transform: translateX(16px); }
  .radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .radio.on { border-color: #E8572A; }
  .radio.on::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #E8572A; }
  .pro-badge { font-size: 9px; background: #1C1915; color: #F9F6F1; padding: 2px 6px; border-radius: 999px; margin-left: 6px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
  .cell { position: relative; aspect-ratio: 4/5; cursor: pointer; background: #e8e4dd; overflow: hidden; }
  .cell-inner { width: 100%; height: 100%; overflow: hidden; position: relative; }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .22s ease; }
  .cell:hover .cell-inner img { transform: scale(1.04); }
  .cell-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background .2s; pointer-events: none; z-index: 2; }
  .cell:hover .cell-play-btn { background: rgba(0,0,0,0.2); }
  .cell-play-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.88); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
  .cell:hover .cell-play-icon { opacity: 1; }
  .cell-play-icon svg { width: 14px; height: 14px; margin-left: 3px; }
  .modal-video { max-width: 90vw; max-height: 85vh; border-radius: 4px; display: block; outline: none; }
  .cell-hover-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%); padding: 32px 8px 8px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .cell:hover .cell-hover-info { opacity: 1; }
  .hover-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .hover-icon svg { width: 13px; height: 13px; }
  .hover-date { font-size: 10px; color: rgba(255,255,255,0.9); font-weight: 500; }
  .hover-caption { font-size: 11px; color: #fff; font-weight: 500; line-height: 1.3; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .badge-tr { position: absolute; top: 5px; right: 5px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); pointer-events: none; z-index: 2; }
  .badge-tr svg { width: 24px; height: 24px; }
  .badge-tl { position: absolute; top: 5px; left: 5px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); pointer-events: none; z-index: 2; }
  .badge-tl svg { width: 24px; height: 24px; }
  .cell.plan-mode { cursor: grab; }
  .cell.plan-mode:active { cursor: grabbing; }
  .cell.dragging { opacity: 0.4; }
  .cell.drag-over { outline: 2px solid var(--plan-accent); outline-offset: -2px; }
  .date-chip { position: absolute; top: 5px; left: 5px; font-size: 9px; font-weight: 700; letter-spacing: .02em; padding: 2px 6px; border-radius: 999px; pointer-events: none; z-index: 3; background: rgba(0,0,0,0.55); color: #fff; transition: background .2s, color .2s; }
  .date-chip.tentative { background: var(--plan-accent); color: #1C1915; }
  .cell-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #EDEAE4; gap: 6px; }
  .cell-placeholder svg { width: 20px; height: 20px; opacity: .4; }
  .cell-placeholder span { font-size: 10px; color: var(--muted); letter-spacing: .04em; }
  .cell-pro-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #EDEAE4; }
  .cell-pro-placeholder span { font-size: 11px; color: var(--muted); letter-spacing: .04em; }
  .empty-cell { aspect-ratio: 4/5; background: #F4F1EC; border: 1.5px dashed rgba(28,25,21,.12); display: flex; align-items: center; justify-content: center; }
  .empty-cell span { font-size: 11px; color: var(--muted); }
  .watermark { text-align: center; margin-top: 8px; font-size: 10px; color: rgba(28,25,21,.25); letter-spacing: .06em; text-transform: uppercase; }
  #saving-indicator { display: none; position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #F9F6F1; padding: 6px 14px; border-radius: 999px; font-size: 11px; z-index: 999; }
  body.bio-mode #bio-section { padding: 24px 16px 20px; }
  body.bio-mode .bio-avatar { width: 100px; height: 100px; }
  body.bio-mode .bio-avatar-placeholder { font-size: 36px; }
  body.bio-mode .bio-username { font-size: 20px; margin-bottom: 4px; }
  body.bio-mode .bio-displayname { font-size: 16px; margin-bottom: 8px; }
  body.bio-mode .bio-text { font-size: 14px; margin-bottom: 6px; }
  body.bio-mode .bio-website { font-size: 14px; }
  body.bio-mode .bio-top { gap: 20px; align-items: center; }
  body.bio-mode #highlights-section { padding: 12px 16px 16px; gap: 16px; }
  body.bio-mode .highlight-circle { width: 68px; height: 68px; }
  body.bio-mode .highlight-label { font-size: 12px; max-width: 72px; }
  #bio-refresh-btn { display: none; position: absolute; bottom: 10px; right: 10px; background: rgba(28,25,21,0.07); border: none; border-radius: 999px; padding: 5px 10px; font-size: 10px; color: var(--muted); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; transition: opacity .2s; }
  #bio-refresh-btn:hover { opacity: .7; }
  #bio-refresh-btn svg { width: 10px; height: 10px; }
  body:not(.bio-mode) #bio-refresh-btn { display: none !important; }
  body.dark { --ink: #F0EDE8; --cream: #1C1915; --muted: #9A948E; --border: rgba(240,237,232,0.12); background: #1C1915; }
  body.dark #settings-panel { background: #2A2520; border-color: rgba(240,237,232,0.15); }
  body.dark .setting-row:hover { background: #332D28; }
  body.dark #plan-bar { background: #2A2400; border-color: rgba(245,200,66,0.3); }
  body.dark .btn-cancel { background: #2A2520; color: #F0EDE8; }
  body.dark .cell { background: #2A2520; }
  body.dark .empty-cell { background: #232018; border-color: rgba(240,237,232,0.1); }
  body.dark .cell-placeholder { background: #2A2520; }
  body.dark .cell-pro-placeholder { background: #2A2520; }
  body.dark #modal { background: rgba(0,0,0,0.92); }
  body.dark .btn-refresh { background: #F0EDE8; color: #1C1915; }
  body.dark .btn-plan { background: #2A2520; color: #F0EDE8; }
  body.dark .btn-plan.active { background: #F0EDE8; color: #1C1915; }
  body.dark .btn-icon { background: #2A2520; color: #F0EDE8; }
  body.dark .highlight-circle { background: #2A2520; }
  body.dark .bio-avatar { background: #2A2520; }
  .grid.wide { grid-template-columns: repeat(5, 1fr); }
  .cell-map-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 6px; }
  .cell-map-label { font-size: 11px; font-weight: 600; color: #fff; text-align: center; line-height: 1.3; text-shadow: 0 1px 3px rgba(0,0,0,0.3); letter-spacing: .01em; }
  #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
  #modal.open { display: flex; }
  .modal-inner { position: relative; max-width: 90vw; max-height: 90vh; display: flex; align-items: center; justify-content: center; }
  .modal-img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 4px; display: block; }
  .modal-close { position: fixed; top: 16px; right: 16px; background: rgba(0,0,0,0.4); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 18px; }
  .modal-close:hover { background: rgba(0,0,0,0.6); }
  .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.25); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; z-index: 10; transition: background .2s; }
  .modal-nav:hover { background: rgba(0,0,0,0.5); }
  .modal-prev { left: 10px; }
  .modal-next { right: 10px; }
  .modal-nav.hidden { display: none; }
  .modal-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .modal-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); }
  .modal-dot.active { background: white; }
  .modal-info { position: absolute; bottom: -44px; left: 0; right: 0; text-align: center; }
  .modal-caption { font-size: 12px; color: rgba(255,255,255,0.8); }
  .modal-date { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .modal-preview-btn { position: fixed; top: 16px; left: 16px; background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,0.3); color: #fff; border-radius: 999px; padding: 7px 18px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background .2s; white-space: nowrap; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal-preview-btn:hover { background: rgba(255,255,255,0.25); }
  #post-preview { display: none; background: #fff; border-radius: 12px; overflow: hidden; width: min(400px, 92vw); }
  #post-preview.open { display: block; }
  .pp-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 0.5px solid rgba(28,25,21,0.1); }
  .pp-avatar { width: 34px; height: 34px; border-radius: 50%; background: #E8E4DD; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(28,25,21,0.1); }
  .pp-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pp-avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; background: #C8B89A; }
  .pp-user-wrap { flex: 1; min-width: 0; }
  .pp-username { font-size: 12px; font-weight: 700; color: #1C1915; line-height: 1.2; }
  .pp-song { font-size: 10px; color: #7A7570; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
  .pp-song svg { width: 10px; height: 10px; flex-shrink: 0; }
  .pp-dots { font-size: 18px; color: #1C1915; letter-spacing: 2px; line-height: 1; flex-shrink: 0; }
  .pp-image { width: 100%; aspect-ratio: 1/1; background: #EDEAE4; overflow: hidden; }
  .pp-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pp-image video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pp-image-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #aaa; }
  .pp-actions { display: flex; align-items: center; padding: 10px 12px 6px; gap: 14px; }
  .pp-actions svg { width: 22px; height: 22px; }
  .pp-bookmark { margin-left: auto; }
  .pp-likes { font-size: 12px; font-weight: 700; color: #1C1915; padding: 0 12px 5px; }
  .pp-caption { font-size: 12px; color: #1C1915; padding: 0 12px 10px; line-height: 1.45; }
  .pp-caption strong { font-weight: 700; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Cargando tu grid…</div>
<div id="error"><p>No se pudo cargar el grid.</p><p style="margin-top:4px;font-size:11px;">Verifica que tu integración de Notion esté activa.</p></div>
<div id="saving-indicator">Guardando orden…</div>
<div id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-inner">
    <button class="modal-nav modal-prev hidden" onclick="modalNav(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="modal-nav modal-next hidden" onclick="modalNav(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    <div id="post-preview">
      <div class="pp-header">
        <div class="pp-avatar" id="pp-avatar"><div class="pp-avatar-placeholder" id="pp-avatar-placeholder">?</div></div>
        <div class="pp-user-wrap">
          <div class="pp-username" id="pp-username">@usuario</div>
          <div class="pp-song" id="pp-song-row" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <span id="pp-song-text"></span>
          </div>
        </div>
        <div class="pp-dots">···</div>
      </div>
      <div class="pp-image" id="pp-image"><div class="pp-image-placeholder">sin imagen</div></div>
      <div class="pp-actions">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1915" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1915" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1915" stroke-width="1.8"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="#1C1915" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <svg class="pp-bookmark" viewBox="0 0 24 24" fill="none" stroke="#1C1915" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="pp-likes" id="pp-likes" style="display:none;"></div>
      <div class="pp-caption" id="pp-caption" style="display:none;"></div>
    </div>
    <div class="modal-dots" id="modal-dots"></div>
    <div class="modal-info"><div class="modal-caption" id="modal-caption"></div><div class="modal-date" id="modal-date"></div></div>
  </div>
  <button class="modal-preview-btn" id="modal-preview-btn" onclick="togglePostPreview()">Ver como post</button>
</div>
<div id="widget">
  <div class="widget-wrapper">
    <div id="bio-section">
      <div class="bio-top">
        <div class="bio-avatar" id="bio-avatar"><div class="bio-avatar-placeholder" id="bio-avatar-placeholder"></div></div>
        <div class="bio-info">
          <div class="bio-username" id="bio-username"></div>
          <div class="bio-displayname" id="bio-displayname"></div>
          <div class="bio-text" id="bio-text"></div>
          <a class="bio-website" id="bio-website" href="#" target="_blank"></a>
        </div>
      </div>
    </div>
    <div id="highlights-section"></div>
    <button id="bio-refresh-btn" onclick="loadWidget()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
    <div class="divider"></div>
    <div class="toolbar">
      <button class="toolbar-btn btn-refresh" id="btn-refresh" onclick="loadWidget()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh

function renderGrid(posts, plan) {

}
function togglePlanMode() { if (!planModeActive) { enterPlanMode(); } }
function enterPlanMode() {
  if (!cachedData) return; planModeActive = true;
  let filtered = cachedData.posts.filter(p => currentTab === 'reels' ? p.mediaType === 'reel' : true);

  document.getElementById('btn-plan-grid').classList.remove('active'); document.getElementById('btn-refresh').style.opacity = ''; document.getElementById('btn-refresh').style.pointerEvents = ''; document.getElementById('plan-bar').classList.remove('visible');

async function savePlanMode() {
  const changes = planOrder.filter(p => p.moved); if (changes.length === 0) { exitPlanMode(false); return; }
  const btn = document.getElementById('btn-save'); btn.disabled = true; btn.textContent = 'Guardando…';
  const indicator = document.getElementById('saving-indicator'); indicator.textContent = 'Guardando orden…'; indicator.style.display = 'block';
  try {
    const orderedIds = planOrder.map(p => p.pageId); const dateMap = {}; changes.forEach(p => { if (p.tentativeDateISO) dateMap[p.pageId] = p.tentativeDateISO; });
    await fetch(`${API_BASE}/api/widget/${widgetId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ orderedIds, dateMap }) });
    const newPosts = planOrder.map(p => { const post = cachedData.posts.find(x => x.pageId === p.pageId); if (!post) return null; return { ...post, publishDate: p.tentativeDate, publishDateISO: p.tentativeDateISO || post.publishDateISO }; }).filter(Boolean);
    cachedData.posts = newPosts; indicator.textContent = 'Orden guardado ✓'; setTimeout(() => { indicator.style.display = 'none'; }, 1200); exitPlanMode(true); renderGrid(cachedData.posts, cachedData.plan);
  } catch(err) { console.error('Error saving plan:', err); indicator.style.display = 'none'; btn.disabled = false; btn.textContent = 'Save'; }

function onPlanDrop(e) {

  const srcSlotDateISO = originalSnapshot[dragSrcIndex] ? originalSnapshot[dragSrcIndex].originalDateISO : null; const dstSlotDateISO = originalSnapshot[destIndex] ? originalSnapshot[destIndex].originalDateISO : null;
  newOrder[destIndex] = { pageId: srcItem.pageId, originalDate: srcItem.originalDate, originalDateISO: srcItem.originalDateISO, tentativeDate: dstSlotDate, tentativeDateISO: dstSlotDateISO, moved: dstSlotDate !== srcItem.originalDate };

function openModal(post) {

  const placeholder = document.getElementById('pp-avatar-placeholder');
  if (profile?.avatarUrl) {
    const img = document.createElement('img'); img.src = profile.avatarUrl; img.alt = '';
    avatarEl.innerHTML = ''; avatarEl.appendChild(img);
  } else {
    const initials = (profile?.displayName || profile?.username || '?').charAt(0).toUpperCase();
    placeholder.textContent = initials; avatarEl.innerHTML = ''; avatarEl.appendChild(placeholder);
  }
  // Username
  const username = profile?.username ? `@${profile.username.replace(/^@/, '')}` : '@usuario';
  document.getElementById('pp-username').textContent = username;
  // Canción
  const songRow = document.getElementById('pp-song-row');
  const songText = document.getElementById('pp-song-text');
  if (modalPost.song) { songText.textContent = modalPost.song; songRow.style.display = 'flex'; }
  else { songRow.style.display = 'none'; }
  // Imagen / Video
  const imgArea = document.getElementById('pp-image');
  imgArea.innerHTML = '';
  const currentPlan = cachedData?.plan;
  if (currentPlan !== 'pro') {
    const ph = document.createElement('div'); ph.className = 'pp-image-placeholder'; ph.textContent = 'Función Pro'; imgArea.appendChild(ph);
  } else {
    const existingModalImg = document.getElementById('modal-img');
    if (existingModalImg && existingModalImg.tagName === 'IMG' && existingModalImg.src) {
      const cloned = existingModalImg.cloneNode(true);
      cloned.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      imgArea.appendChild(cloned);
    } else if (existingModalImg && existingModalImg.tagName === 'VIDEO') {
      // ✅ Post Preview siempre muestra el video (portada es solo para el grid)
      const vid = document.createElement('video');
      vid.src = existingModalImg.src;
      vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      vid.autoplay = true;
      vid.muted = true;
      vid.loop = true;
      vid.playsInline = true;
      imgArea.appendChild(vid);
    } else {
      const imgUrl = modalPost.imageUrl || modalImages[0];
      if (imgUrl && !isVideoUrl(imgUrl) && modalPost.imageSource !== 'canva') {
        const img = document.createElement('img'); img.src = imgUrl; img.alt = ''; img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;'; imgArea.appendChild(img);
      } else if (imgUrl && isVideoUrl(imgUrl)) {
        // ✅ También manejar video cuando no hay modal-img todavía
        const vid = document.createElement('video');
        vid.src = imgUrl;
        vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        vid.autoplay = true;
        vid.muted = true;
        vid.loop = true;
        vid.playsInline = true;
        imgArea.appendChild(vid);
      } else {
        const ph = document.createElement('div'); ph.className = 'pp-image-placeholder'; ph.textContent = 'sin imagen'; imgArea.appendChild(ph);
      }
    }
  }
  // Likes
  const likesEl = document.getElementById('pp-likes');
  if (modalPost.likes !== null && modalPost.likes !== undefined) {
    likesEl.textContent = `${modalPost.likes.toLocaleString('es-MX')} me gusta`;
    likesEl.style.display = 'block';
  } else { likesEl.style.display = 'none'; }
  // Caption
  const captionEl = document.getElementById('pp-caption');
  const captionText = modalPost.caption || modalPost.name;
  if (captionText) {
    captionEl.innerHTML = `<strong>${username}</strong> ${captionText}`;
    captionEl.style.display = 'block';
  } else { captionEl.style.display = 'none'; }
}
function onModalKey(e) { if (e.key === 'Escape') closeModal(); if (!postPreviewOpen && e.key === 'ArrowRight') modalNav(1); if (!postPreviewOpen && e.key === 'ArrowLeft') modalNav(-1); }
function modalNav(dir) { modalIndex = Math.max(0, Math.min(modalImages.length - 1, modalIndex + dir)); updateModal(); }
function updateModalNav() {
  const prev = document.querySelector('.modal-prev'); const next = document.querySelector('.modal-next');
  prev.classList.toggle('hidden', modalIndex === 0 || modalImages.length <= 1);
  next.classList.toggle('hidden', modalIndex === modalImages.length - 1 || modalImages.length <= 1);
}
function updateModal() {
  const modalInner = document.querySelector('.modal-inner');
  const existing = document.getElementById('modal-img'); if (existing) { if (existing.tagName === 'VIDEO') existing.pause(); existing.remove(); }
  const existingIframe = document.getElementById('modal-iframe'); if (existingIframe) existingIframe.remove();
  if (modalIsCanva) {
    const iframe = document.createElement('iframe'); iframe.id = 'modal-iframe'; iframe.src = modalImages[modalIndex]; iframe.style.cssText = 'width:80vw;height:80vh;border:none;border-radius:4px;'; iframe.setAttribute('allowfullscreen', ''); const prev = document.querySelector('.modal-prev'); modalInner.insertBefore(iframe, prev);
  } else if (isVideoUrl(modalImages[modalIndex])) {
    const vid = document.createElement('video'); vid.id = 'modal-img'; vid.className = 'modal-video';
    vid.src = modalImages[modalIndex]; vid.controls = true; vid.autoplay = true; vid.playsInline = true;
    const prev = document.querySelector('.modal-prev'); modalInner.insertBefore(vid, prev);
  } else {
    const img = document.createElement('img'); img.id = 'modal-img'; img.className = 'modal-img'; img.src = modalImages[modalIndex]; img.alt = ''; const prev = document.querySelector('.modal-prev'); modalInner.insertBefore(img, prev);
  }
  document.getElementById('modal-caption').textContent = modalPost?.name || ''; document.getElementById('modal-date').textContent = modalPost?.publishDate || '';
  updateModalNav();
  const dots = document.getElementById('modal-dots'); dots.innerHTML = '';
  if (modalImages.length > 1) { modalImages.forEach((_, i) => { const dot = document.createElement('div'); dot.className = 'modal-dot' + (i === modalIndex ? ' active' : ''); dots.appendChild(dot); }); }
}
document.getElementById('modal').addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) closeModal(); });
function onDragStart(e) { dragSrcIndex = parseInt(this.dataset.index); this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; this.classList.add('drag-over'); }
function onDragLeave() { this.classList.remove('drag-over'); }
async function onDrop(e) {
  e.preventDefault(); this.classList.remove('drag-over'); const destIndex = parseInt(this.dataset.index); if (dragSrcIndex === destIndex || isNaN(destIndex)) return;
  const newOrder = [...currentOrder]; const [moved] = newOrder.splice(dragSrcIndex, 1); newOrder.splice(destIndex, 0, moved); currentOrder = newOrder;
  const reordered = newOrder.map(id => cachedData.posts.find(p => p.pageId === id)).filter(Boolean); cachedData.posts = reordered; renderGrid(reordered, cachedData.plan); await saveOrderToNotion(newOrder);
}
function onDragEnd() { this.classList.remove('dragging'); document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over')); }
async function saveOrderToNotion(orderedIds) {
  const indicator = document.getElementById('saving-indicator'); indicator.textContent = 'Guardando orden…'; indicator.style.display = 'block';
  try { await fetch(`${API_BASE}/api/widget/${widgetId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ orderedIds }) }); } catch (err) { console.error('Error saving order:', err); }
  finally { setTimeout(() => { indicator.style.display = 'none'; }, 1500); }
}
function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }
document.addEventListener('click', (e) => { const panel = document.getElementById('settings-panel'); const btn = document.getElementById('settings-btn'); if (!panel.contains(e.target) && !btn.contains(e.target)) closeSettings(); });
function toggleSetting(key) { settings[key] = !settings[key]; saveSettings(); if (key === 'wideGrid') { applyWideGrid(); updateSettingsUI(); } else { renderAll(); } }
function setSortMode(mode) { settings.sortMode = mode; saveSettings(); renderAll(); }
function updateSettingsUI() {
  document.getElementById('toggle-showBio').className = 'toggle' + (settings.showBio ? ' on' : '');
  document.getElementById('toggle-showHighlights').className = 'toggle' + (settings.showHighlights ? ' on' : '');
  document.getElementById('toggle-showContentMap').className = 'toggle' + (settings.showContentMap ? ' on' : '');
  document.getElementById('toggle-wideGrid').className = 'toggle' + (settings.wideGrid ? ' on' : '');
  document.getElementById('radio-date').className = 'radio on';
}
function toggleDarkMode() { settings.darkMode = !settings.darkMode; saveSettings(); applyDarkMode(); }
function applyDarkMode() {
  document.body.classList.toggle('dark', settings.darkMode);
  document.getElementById('icon-dark').style.display = settings.darkMode ? 'none' : '';
  document.getElementById('icon-light').style.display = settings.darkMode ? '' : 'none';
}
function applyWideGrid() { const grid = document.getElementById('grid'); if (grid) grid.classList.toggle('wide', settings.wideGrid); }
function makePlaceholder(label) { const div = document.createElement('div'); div.className = 'cell-placeholder'; div.innerHTML = `${icons.canva}<span>${label}</span>`; return div; }
function makeProPlaceholder() { const div = document.createElement('div'); div.className = 'cell-pro-placeholder'; div.innerHTML = `<span>Función Pro</span>`; return div; }
loadWidget();
</script>
